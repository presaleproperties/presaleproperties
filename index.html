    <!-- Premium branded splash screen - first visit only -->
    <div id="app-splash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#ffffff;transition:opacity 1s cubic-bezier(.4,0,.2,1),visibility 1s cubic-bezier(.4,0,.2,1);">
      <style>
        @keyframes splash-enter{
          0%{opacity:0;transform:scale(0.96)}
          100%{opacity:1;transform:scale(1)}
        }
        @keyframes splash-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes splash-bar-grow{0%{width:0}100%{width:100%}}
        .splash-inner{display:flex;flex-direction:column;align-items:center;gap:10px;animation:splash-enter 0.8s cubic-bezier(.16,1,.3,1) both}
        .splash-logo{width:min(260px,55vw);height:auto;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.06))}
        @media(min-width:768px){.splash-logo{width:320px}}
        .splash-bar-track{width:80px;height:1.5px;border-radius:1px;background:rgba(196,153,58,0.15);overflow:hidden;opacity:0;animation:splash-enter 0.5s ease 0.4s both}
        .splash-bar-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,transparent,#c4993a,transparent);background-size:200% 100%;animation:splash-shimmer 1.4s ease-in-out infinite,splash-bar-grow 2s cubic-bezier(.4,0,.2,1) 0.5s both}
      </style>
      <div class="splash-inner">
        <img src="/logo-splash.png" alt="PresaleProperties" class="splash-logo" />
        <div class="splash-bar-track"><div class="splash-bar-fill"></div></div>
      </div>
    </div>
    <script>
      if(sessionStorage.getItem('pp_splash_shown')){
        var s=document.getElementById('app-splash');
        if(s)s.style.display='none';
      }else{
        sessionStorage.setItem('pp_splash_shown','1');
      }
    </script>
