  <body>
    <!-- Premium branded splash screen - first visit only -->
    <div id="app-splash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#ffffff;transition:opacity 1s cubic-bezier(.4,0,.2,1),visibility 1s cubic-bezier(.4,0,.2,1);">
      <style>
        @media(prefers-color-scheme:dark){#app-splash{background:#0f1419!important}}
        @keyframes splash-fade-up{
          0%{opacity:0;transform:translateY(30px) scale(0.9)}
          50%{opacity:1;transform:translateY(-4px) scale(1.02)}
          100%{opacity:1;transform:translateY(0) scale(1)}
        }
        @keyframes splash-glow{
          0%,100%{box-shadow:0 0 0 0 rgba(196,153,58,0)}
          50%{box-shadow:0 0 80px 20px rgba(196,153,58,0.10)}
        }
        @keyframes splash-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes splash-tagline{
          0%{opacity:0;transform:translateY(8px);letter-spacing:0.3em}
          100%{opacity:1;transform:translateY(0);letter-spacing:0.25em}
        }
        @keyframes splash-bar-grow{
          0%{width:0}
          100%{width:100%}
        }
        .splash-inner{display:flex;flex-direction:column;align-items:center;gap:28px;animation:splash-fade-up 1.2s cubic-bezier(.16,1,.3,1) both}
        .splash-logo-wrap{position:relative;display:flex;align-items:center;justify-content:center;animation:splash-glow 2.8s ease-in-out infinite}
        .splash-logo{width:min(300px, 65vw);height:auto;opacity:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.06))}
        @media(min-width:768px){.splash-logo{width:360px}}
        @media(min-width:1024px){.splash-logo{width:420px}}
        @media(prefers-color-scheme:dark){
          .splash-logo{filter:brightness(1.15) drop-shadow(0 4px 20px rgba(212,169,74,0.2))}
        }
        .splash-tagline{
          font-family:'Inter',system-ui,-apple-system,sans-serif;
          font-size:11px;font-weight:500;letter-spacing:0.25em;text-transform:uppercase;
          color:rgba(196,153,58,0.7);
          animation:splash-tagline 0.8s cubic-bezier(.16,1,.3,1) 0.6s both;
        }
        @media(prefers-color-scheme:dark){.splash-tagline{color:rgba(212,169,74,0.6)}}
        .splash-bar-track{width:120px;height:2px;border-radius:2px;background:rgba(196,153,58,0.08);overflow:hidden;animation:splash-tagline 0.6s ease 0.8s both}
        .splash-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,transparent,#c4993a,transparent);background-size:200% 100%;animation:splash-shimmer 1.2s ease-in-out infinite,splash-bar-grow 1.8s cubic-bezier(.4,0,.2,1) 0.8s both}
        @media(prefers-color-scheme:dark){
          .splash-bar-track{background:rgba(212,169,74,0.06)}
          .splash-bar-fill{background:linear-gradient(90deg,transparent,#d4a94a,transparent);background-size:200% 100%}
        }
      </style>
      <div class="splash-inner">
        <div class="splash-logo-wrap">
          <img src="/logo-splash.png" alt="PresaleProperties" class="splash-logo" />
        </div>
        <p class="splash-tagline">New Homes &bull; Made Simple</p>
        <div class="splash-bar-track"><div class="splash-bar-fill"></div></div>
      </div>
    </div>
    <script>
      if(sessionStorage.getItem('pp_splash_shown')){
        var s=document.getElementById('app-splash');
        if(s)s.style.display='none';
      }else{
        sessionStorage.setItem('pp_splash_shown','1');
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
